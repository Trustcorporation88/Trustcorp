<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato | Trust Corporation</title>
  <link rel="icon" href="assets/logo-trust.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body{background:#0A111E;color:#f4f7fb;font-family:Inter,Manrope,system-ui,sans-serif;margin:0}
    .wrap{max-width:960px;margin:0 auto;padding:24px 16px 64px}
    .grid{display:grid;gap:16px}
    @media(min-width:800px){.grid{grid-template-columns:1.1fr .9fr}}
    .panel{padding:22px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(15,26,44,.9)}
    h1{margin:0 0 10px;font-size:clamp(1.6rem,4vw,2.3rem)}
    .lead{color:#9aa6b2}
    label{display:block;margin:12px 0 6px;color:#8b95a7;font-size:13px}
    input,textarea{width:100%;box-sizing:border-box;min-height:44px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);color:#fff;padding:10px 12px;font:inherit}
    textarea{min-height:120px;resize:vertical}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 14px;border-radius:12px;border:0;background:linear-gradient(135deg,#e0c48a,#9a7640);color:#1a1205;font-weight:700;cursor:pointer;margin-top:14px}
    a{color:#c99c66}
    ul{line-height:1.7;color:#c5cddb}
  </style>
</head>
<body>
  <div class="wrap">
    <p><a href="index.html">← Voltar</a></p>
    <div class="grid">
      <div class="panel">
        <h1>Fale com a TrustCorp</h1>
        <p class="lead">Solicite demo, acesso ou integração. Enviamos direto para o WhatsApp oficial.</p>
        <form id="contact-form">
          <label for="nome">Nome</label>
          <input id="nome" required />
          <label for="email">E-mail</label>
          <input id="email" type="email" required />
          <label for="empresa">Empresa</label>
          <input id="empresa" />
          <label for="produto">Produto / interesse</label>
          <input id="produto" />
          <label for="mensagem">Mensagem</label>
          <textarea id="mensagem"></textarea>
          <button class="btn" type="submit">Enviar no WhatsApp</button>
        </form>
      </div>
      <div class="panel">
        <h2 style="margin-top:0">Canais oficiais</h2>
        <ul>
          <li>E-mail: <a href="mailto:flavio@trustcorp.com.br">flavio@trustcorp.com.br</a></li>
          <li>WhatsApp: <a href="https://wa.me/5514998370223" target="_blank" rel="noopener">@frinaldi.co</a></li>
          <li>Instagram: <a href="https://instagram.com/frinaldi.co" target="_blank" rel="noopener">@frinaldi.co</a></li>
        </ul>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('produto')) document.getElementById('produto').value = params.get('produto');
    document.getElementById('contact-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const text = [
        'Olá, TrustCorp!',
        `Nome: ${nome.value.trim()}`,
        `E-mail: ${email.value.trim()}`,
        empresa.value.trim() ? `Empresa: ${empresa.value.trim()}` : null,
        `Interesse: ${produto.value.trim() || 'Não informado'}`,
        mensagem.value.trim() ? `Mensagem: ${mensagem.value.trim()}` : null,
      ].filter(Boolean).join('\n');
      window.open(`https://wa.me/5514998370223?text=${encodeURIComponent(text)}`, '_blank', 'noopener,noreferrer');
    });
  </script>
</body>
</html>
